name: Notify main site on content push

on:
  push:
    branches: [main]

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cms-theme2 rebuild
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.MAIN_REPO_PAT }}
          repository: breakthrough-india/cms
          event-type: state-content-updated
