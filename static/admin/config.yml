backend:
  name: github
  repo: breakthrough-india/cms-kerala
  branch: main
  base_url: https://cms-auth.breakthrough-science-society.workers.dev

media_folder: content/articles
public_folder: /articles

site_url: https://breakthrough-india.github.io/cms/states/kerala/

collections:
  - name: articles
    label: Articles
    folder: content/articles
    create: true
    path: "{{slug}}/index"
    media_folder: images
    public_folder: images
    preview_path: articles/{{slug}}/
    fields:
      - label: Title
        name: title
        widget: string

      - label: Publish Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Last Modified
        name: lastmod
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Draft
        name: draft
        widget: boolean
        default: true

      - label: Description
        name: description
        widget: text
        required: false

      - label: Author
        name: author
        widget: string
        default: Admin

      - label: Categories
        name: categories
        widget: list
        default: ["Tech"]

      - label: Tags
        name: tags
        widget: list
        required: false

      - label: Hero Image
        name: image
        widget: image
        required: false
        choose_url: true
        media_libraries:
          default: false
        hint: "Paste an image URL (e.g. https://images.unsplash.com/photo-ID?w=1200&fm=webp&q=80)"

      - label: Show in Home Slider
        name: show_in_slider
        widget: boolean
        default: false

      - label: State Chapter
        name: states
        widget: select
        multiple: true
        required: false
        default: ["kerala"]
        options:
          - { label: "kerala", value: "kerala" }

      - label: Feature in Home Page
        name: featureinhomepage
        widget: boolean
        default: false
        hint: "Show this post in the 'From State Chapters' section on the main site home page"

      - label: Table of Contents
        name: toc
        widget: boolean
        default: true

      - label: Comments
        name: comments
        widget: boolean
        default: true

      - label: Body
        name: body
        widget: markdown

  - name: news
    label: News
    folder: content/news
    create: true
    path: "{{slug}}/index"
    media_folder: images
    public_folder: images
    preview_path: news/{{slug}}/
    fields:
      - label: Title
        name: title
        widget: string

      - label: Publish Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Last Modified
        name: lastmod
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Draft
        name: draft
        widget: boolean
        default: true

      - label: Description
        name: description
        widget: text
        required: false

      - label: Author
        name: author
        widget: string
        default: Admin

      - label: Categories
        name: categories
        widget: list
        default: ["News"]

      - label: Tags
        name: tags
        widget: list
        required: false

      - label: Hero Image
        name: image
        widget: image
        required: false
        choose_url: true
        media_libraries:
          default: false
        hint: "Paste an image URL (e.g. https://images.unsplash.com/photo-ID?w=1200&fm=webp&q=80)"

      - label: Show in Home Slider
        name: show_in_slider
        widget: boolean
        default: false

      - label: State Chapter
        name: states
        widget: select
        multiple: true
        required: false
        default: ["kerala"]
        options:
          - { label: "Kerala", value: "kerala" }

      - label: Feature in Home Page
        name: featureinhomepage
        widget: boolean
        default: false
        hint: "Show this post in the 'From State Chapters' section on the main site home page"

      - label: Body
        name: body
        widget: markdown

  - name: events
    label: Events
    folder: content/events
    create: true
    path: "{{slug}}/index"
    media_folder: images
    public_folder: images
    preview_path: events/{{slug}}/
    fields:
      - label: Title
        name: title
        widget: string

      - label: Publish Date
        name: date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Last Modified
        name: lastmod
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"

      - label: Draft
        name: draft
        widget: boolean
        default: true

      - label: Description
        name: description
        widget: text
        required: false

      - label: Author
        name: author
        widget: string
        default: Admin

      - label: Event Date
        name: event_date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        required: false

      - label: Event End Date
        name: event_end_date
        widget: datetime
        format: "YYYY-MM-DDTHH:mm:ssZ"
        required: false

      - label: Location
        name: event_location
        widget: string
        required: false
        hint: "e.g. Cubbon Park, Cochin, Kerala"

      - label: Registration URL
        name: registration_url
        widget: string
        required: false
        hint: "Set to any non-empty value (e.g. 'enabled') to show the inline registration form on this event's page. Leave empty to hide the form."

      - label: Categories
        name: categories
        widget: list
        default: ["Events"]

      - label: Tags
        name: tags
        widget: list
        required: false

      - label: Hero Image
        name: image
        widget: image
        required: false
        choose_url: true
        media_libraries:
          default: false
        hint: "Paste an image URL (e.g. https://images.unsplash.com/photo-ID?w=1200&fm=webp&q=80)"

      - label: State Chapter
        name: states
        widget: select
        multiple: true
        required: false
        default: ["kerala"]
        options:
          - { label: "Kerala", value: "kerala" }

      - label: Feature in Home Page
        name: featureinhomepage
        widget: boolean
        default: false
        hint: "Show this event in the 'From State Chapters' section on the main site home page"

      - label: Body
        name: body
        widget: markdown
